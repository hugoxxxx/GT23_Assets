name: Update README with Logos
on:
  push:
    branches: [main]
    paths:
      - 'logos/**'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Generate README
        run: |
          added=$(git diff --name-only --diff-filter=A HEAD^ HEAD | grep '^logos/' || true)
          deleted=$(git diff --name-only --diff-filter=D HEAD^ HEAD | grep '^logos/' || true)

          cat > diff.md <<EOF
          ### ✅ 本次新增
          EOF
          if [ -n "$added" ]; then for f in $added; do name=$(basename "$f" .png); echo "- \`$name\`" >> diff.md; done; else echo "无" >> diff.md; fi
          echo "" >> diff.md
          echo "### 🗑️ 本次删除" >> diff.md
          if [ -n "$deleted" ]; then for f in $deleted; do name=$(basename "$f" .png); echo "- \`$name\`" >> diff.md; done; else echo "无" >> diff.md; fi

          echo "## 🖼️ Logo 列表" > list.md
          echo "" >> list.md

          brands=$(for f in logos/*.png; do basename "$f" .png; done | cut -d'-' -f1 | sort -u | uniq)

          for brand in ${brands}; do
            echo "<details>" >> list.md
            echo "<summary><b>${brand}</b></summary>" >> list.md
            echo "<div style='display:flex; flex-wrap:wrap; gap:12px; margin:12px 0;'>" >> list.md
            
            for img in logos/${brand}-*.png; do
              [ -e "$img" ] || continue
              filename=$(basename "$img" .png)
              model=$(echo "$filename" | cut -d'-' -f2-)
              
              # ✅ 统一尺寸：2.8:1 比例（宽度140px / 高度50px）
              echo "<div style='text-align:center;'>
              <img src='$img' style='width:140px; height:50px; object-fit:contain; background:#f8f9fa; border-radius:8px; padding:8px;'>
              <br><small style='font-size:12px; color:#666;'>$model</small>
              </div>" >> list.md
            done
            
            echo "</div>" >> list.md
            echo "</details>" >> list.md
            echo "" >> list.md
          done

          awk '
              /<!-- AUTO-UPDATE-LOG:START -->/ {print; system("cat diff.md"); print "<!-- AUTO-UPDATE-LOG:END -->"; ok=0; next}
              /<!-- AUTO-UPDATE-LOG:END -->/ {ok=1; next}
              /<!-- AUTO-LOGO-LIST:START -->/ {print; system("cat list.md"); print "<!-- AUTO-LOGO-LIST:END -->"; ok=0; next}
              /<!-- AUTO-LOGO-LIST:END -->/ {ok=1; next}
              ok{print}
          ' README.md > tmp && mv tmp README.md

      - name: Force push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Fixed: uniform 2.8:1 card size + horizontal layout"
          git push origin main --force
