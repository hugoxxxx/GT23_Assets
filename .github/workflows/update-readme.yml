name: Update README with Logos
on:
  push:
    branches: [main]
    paths:
      - 'logos/**'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Generate README
        run: |
          added=$(git diff --name-only --diff-filter=A HEAD^ HEAD | grep '^logos/' || true)
          deleted=$(git diff --name-only --diff-filter=D HEAD^ HEAD | grep '^logos/' || true)

          cat > diff.md <<EOF
          ### ✅ 本次新增
          EOF
          if [ -n "$added" ]; then for f in $added; do name=$(basename "$f" .png); echo "- \`$name\`" >> diff.md; done; else echo "无" >> diff.md; fi
          echo "" >> diff.md
          echo "### 🗑️ 本次删除" >> diff.md
          if [ -n "$deleted" ]; then for f in $deleted; do name=$(basename "$f" .png); echo "- \`$name\`" >> diff.md; done; else echo "无" >> diff.md; fi

          echo "## 🖼️ Logo 列表" > list.md
          echo "" >> list.md

          brands=$(ls logos/*.png 2>/dev/null | xargs -n1 basename .png | cut -d'-' -f1 | sort -u | uniq)

          for brand in ${brands}; do
            echo "<details>" >> list.md
            echo "<summary><b>${brand}</b></summary>" >> list.md
            echo "<div style='display:flex; flex-wrap:wrap; gap:12px; margin:10px 0;'>" >> list.md
            
            for img in logos/${brand}-*.png; do
              [ -e "$img" ] || continue
              filename=$(basename "$img" .png)
              model=$(echo "$filename" | cut -d'-' -f2-)
              echo "<div style='text-align:center;'><img src='$img' width='70' style='padding:8px; background:#f8f9fa; border-radius:8px;'><br><small style='font-size:12px; color:#666;'>$model</small></div>" >> list.md
            done
            
            echo "</div>" >> list.md
            echo "</details>" >> list.md
            echo "" >> list.md
          done

          awk '
              /<!-- AUTO-UPDATE-LOG:START -->/ {print; system("cat diff.md"); print "<!-- AUTO-UPDATE-LOG:END -->"; ok=0; next}
              /<!-- AUTO-UPDATE-LOG:END -->/ {ok=1; next}
              /<!-- AUTO-LOGO-LIST:START -->/ {print; system("cat list.md"); print "<!-- AUTO-LOGO-LIST:END -->"; ok=0; next}
              /<!-- AUTO-LOGO-LIST:END -->/ {ok=1; next}
              ok{print}
          ' README.md > tmp && mv tmp README.md

      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Style: flex horizontal layout"
          file_pattern: README.md
